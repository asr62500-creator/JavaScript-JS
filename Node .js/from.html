<html>

<head>
    <title>Student Form</title>
</head>

<body>

    <h2>Enter Student Details</h2>

    <form action="http://localhost:3000" method="POST">

        Roll No:
        <input type="text" name="rno" placeholder="Enter Roll No">
        <br><br>

        Name:
        <input type="text" name="name" placeholder="Enter Name">
        <br><br>

        Subject 1 Marks:
        <input type="number" name="m1" placeholder="Enter Marks">
        <br><br>

        Subject 2 Marks:
        <input type="number" name="m2" placeholder="Enter Marks">
        <br><br>

        Subject 3 Marks:
        <input type="number" name="m3" placeholder="Enter Marks">
        <br><br>

        Subject 4 Marks:
        <input type="number" name="m4" placeholder="Enter Marks">
        <br><br>

        <input type="submit" value="Submit">

    </form>

</body>

</html>
